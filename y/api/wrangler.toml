name = "mkplayer-cf"
main = "worker.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# ============================================
# 部署方式一：Worker + Pages
# 1. 部署 Worker: npx wrangler deploy
# 2. 部署 Pages:  将 public/ 目录部署到 Cloudflare Pages
# 3. 在 Pages 设置中绑定 Worker 路由
# ============================================

# Worker 设置
[observability]
enabled = true

# 如果你有 KV namespace，取消下面的注释用于缓存
# [[kv_namespaces]]
# binding = "CACHE"
# id = "your-kv-namespace-id"

# ============================================
# 部署方式二：纯 Worker（含静态资源）
# 取消下面注释，Worker 直接 serve 静态文件
# ============================================
# [assets]
# directory = "./public"
# binding = "ASSETS"

# 路由配置 (可选)
# [[routes]]
# pattern = "your-domain.com/api"
# zone_name = "your-domain.com"
